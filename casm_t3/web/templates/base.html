<!doctype html>
<html><head><title>CASM Monitor</title>
<style>
 body { font-family: system-ui, sans-serif; margin: 1.5em; color: #222; }
 nav a { margin-right: 1.2em; text-decoration: none; color: #06c; font-weight: 600; }
 table { border-collapse: collapse; margin-top: 1em; font-size: 14px; }
 th, td { padding: 3px 10px; border-bottom: 1px solid #ddd; text-align: right; }
 th { background: #f4f4f4; cursor: pointer; user-select: none; } td.l, th.l { text-align: left; }
 tr:hover { background: #f8f8ff; }
 a { color: #06c; } .tag { background:#eef; border-radius:3px; padding:1px 5px; margin-right:3px; font-size:12px;}
 .miss { background:#fdd; border-radius:3px; padding:1px 5px; font-size:12px; color:#900; }
 .lbl-frb{background:#cfc} .lbl-rfi{background:#fdd} .lbl-pulsar{background:#cdf} .lbl-unsure{background:#ffd}
 img { max-width: 100%; border: 1px solid #ccc; margin-top: 1em; }
 pre { background:#f6f6f6; padding:1em; overflow-x:auto; font-size:12px; }
 .muted { color:#888; font-size:13px; }
</style>{% block head %}{% endblock %}</head><body>
<nav><a href="/">T2 events</a><a href="/stats">Stats</a><a href="/injections">Injections</a>
<span class="muted">refresh page to update</span></nav>
{% block content %}{% endblock %}
<script>
// Click a column header to sort (numeric when the column parses as numbers).
document.querySelectorAll("table").forEach(table => {
  const headers = table.querySelectorAll("tr:first-child th");
  headers.forEach((th, col) => th.addEventListener("click", () => {
    const rows = Array.from(table.querySelectorAll("tr")).slice(1);
    const asc = th.dataset.asc !== "true";
    headers.forEach(h => { delete h.dataset.asc; h.textContent = h.textContent.replace(/ [\u25b2\u25bc]$/, ""); });
    th.dataset.asc = asc;
    th.textContent += asc ? " \u25b2" : " \u25bc";
    const key = r => (r.children[col] ? r.children[col].textContent.trim() : "");
    const allNum = rows.every(r => key(r) === "" || !isNaN(parseFloat(key(r))));
    rows.sort((a, b) => {
      const x = key(a), y = key(b);
      const cmp = allNum ? (parseFloat(x) || -Infinity) - (parseFloat(y) || -Infinity)
                         : x.localeCompare(y);
      return asc ? cmp : -cmp;
    });
    rows.forEach(r => table.appendChild(r));
  }));
});
</script>
</body></html>
